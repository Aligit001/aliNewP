name: Unity Build Android 🚀

on:
  push:
    branches:
      - main  # تأكد أن هذا هو اسم الفرع عندك

jobs:
  build:
    name: Build for Android 🤖
    runs-on: ubuntu-latest # لينكس هو الأسرع لتصدير الأندرويد
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true # ضروري جداً لأنك تستخدم Git LFS لملفات Unity

      - name: Cache Library
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-Android

      - name: Build Project
        uses: game-ci/unity-builder@v2
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }} # تأكد من وضع الرخصة في الـ Secrets
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: Android
          androidAppBundle: false # لكي يعطيك ملف APK وليس AAB
          androidKeystoreName: user.keystore
          androidKeystorePass: ${{ secrets.KEYSTORE_PASS }}
          androidKeyaliasName: release
          androidKeyaliasPass: ${{ secrets.KEY_PASS }}

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Game-Android-APK
          path: build/Android/Android.apk
