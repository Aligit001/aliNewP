name: Unity Build Android 🚀

on:
  push:
    branches:
      - main 

jobs:
  build:
    name: Build for Android 🤖
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # نسخة حديثة
        with:
          fetch-depth: 0
          lfs: true 

      - name: Cache Library
        uses: actions/cache@v4 # تم التحديث من v3 إلى v4
        with:
          path: Library
          key: Library-Android

      - name: Build Project
        uses: game-ci/unity-builder@v2
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }} 
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: Android
          androidAppBundle: false 
          # إذا لم يكن لديك Keystore، يمكنك حذف الأسطر الأربعة القادمة أو تركها كـ Secrets
          androidKeystoreName: user.keystore
          androidKeystorePass: ${{ secrets.KEYSTORE_PASS }}
          androidKeyaliasName: release
          androidKeyaliasPass: ${{ secrets.KEY_PASS }}

      - name: Upload APK
        uses: actions/upload-artifact@v4 # التحديث المطلوب لحل الخطأ الأحمر 🛠️
        with:
          name: Game-Android-APK
          path: build/Android/Android.apk
