name: Unity Android CI 🚀

on: workflow_dispatch

jobs:
  build:
    name: Build Android 📱
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Cache Library
      uses: actions/cache@v3
      with:
        path: Library
        key: Library-Android
        restore-keys: |
          Library-

    - name: Build APK
      uses: game-ci/unity-builder@v4
      env:
        UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      with:
        unityVersion: 6000.4.0f1
        targetPlatform: Android
        androidAppBundle: false
        buildName: MyGame
        buildsPath: build
        # إعدادات التوقيع - تأكد من كتابة كلمة السر الحقيقية هنا
        androidKeystoreName: ali_world.keystore
        androidKeystorePass: "Ali.wra.5648" 
        androidKeyaliasName: ali_dev
        androidKeyaliasPass: "Ali.wra.5648"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Android-APK
        path: build/Android/*.apk
