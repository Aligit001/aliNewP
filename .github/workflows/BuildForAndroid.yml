name: Unity Build Android 🚀

on:
  push:
    branches:
      - main 

jobs:
  build:
    name: Build for Android 🤖
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # نسخة حديثة
        with:
          fetch-depth: 0
          lfs: true 

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-Android-

      - name: Build Project
        uses: game-ci/unity-builder@v4 # حدثنا النسخة هنا إلى v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.4.0f1 # حددنا الإصدار يدوياً لتجنب خطأ الـ Parsing
          targetPlatform: Android
          androidAppBundle: false
          androidKeystoreName: user.keystore
          androidKeyaliasName: release
          androidKeystorePass: ${{ secrets.KEYSTORE_PASS }}
          androidKeyaliasPass: ${{ secrets.KEY_PASS }}

      - name: Upload APK
        uses: actions/upload-artifact@v4 # التحديث المطلوب لحل الخطأ الأحمر 🛠️
        with:
          name: Game-Android-APK
          path: build/Android/Android.apk
