name: Unity iOS Unsigned Build 🚀

on: [workflow_dispatch, push]

jobs:
  build:
    name: Build iOS Project 🍏
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      # 1. تصدير هيكل المشروع من يونيتي
      - name: Unity - Builder
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: iOS
          version: 6000.4.0f1

      # 2. تجميع المشروع ليصبح تطبيق (.app) بدون شهادات
      - name: Compile Xcode Project 🔨
        run: |
          cd build/iOS
          xcodebuild -project Unity-iPhone.xcodeproj -scheme Unity-iPhone -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build
          
      # 3. تحويل التطبيق إلى ملف IPA جاهز
      - name: Create IPA File 📦
        run: |
          mkdir -p Payload
          # البحث عن التطبيق ونقله لمجلد Payload
          find build/iOS -name "*.app" -exec cp -r {} Payload/ \;
          # ضغط الملف وتغيير صيغته
          zip -r AliGame.ipa Payload
          
      # 4. رفع الملف النهائي لك
      - name: Upload Final IPA 🚀
        uses: actions/upload-artifact@v4
        with:
          name: Final-Game-IPA
          path: AliGame.ipa
