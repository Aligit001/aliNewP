name: Unity iOS Professional Build 🚀

on: 
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build iOS Project 🍏
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      # 1. تصدير هيكل المشروع من يونيتي
      - name: Unity - Builder 🏗️
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: iOS
          version: 6000.4.0f1

      # 2. تجهيز المكتبات (CocoaPods) إذا كانت موجودة
      - name: Install CocoaPods 📦
        run: |
          if [ -f "build/iOS/Podfile" ]; then
            echo "Podfile found, installing dependencies..."
            cd build/iOS
            pod install
          else
            echo "No Podfile found, skipping..."
          fi

            # 3. تجميع المشروع ليصبح تطبيق (.app) - النسخة المصححة
      - name: Compile Xcode Project 🔨
        run: |
          # الانتقال للمجلد حيث توجد ملفات Xcode
          cd build/iOS
          
          if [ -d "Unity-iPhone.xcworkspace" ]; then
            TARGET="-workspace Unity-iPhone.xcworkspace"
          else
            TARGET="-project Unity-iPhone.xcodeproj"
          fi
          
          xcodebuild $TARGET \
            -scheme Unity-iPhone \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILATION_MODE=singlefile \
            ONLY_ACTIVE_ARCH=NO \
            clean build

      # 4. تحويل التطبيق إلى ملف IPA جاهز
      - name: Create IPA File 📦
        run: |
          mkdir -p Payload
          # البحث عن ملف الـ .app في كل مكان ممكن بالسيرفر
          APP_PATH=$(find . -name "*.app" -type d -not -path "*/Pods/*" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
             APP_PATH=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "*.app" -type d | head -n 1)
          fi

          echo "Found App at: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r AliGame.ipa Payload

      # 4. تحويل التطبيق إلى ملف IPA جاهز
      - name: Create IPA File 📦
        run: |
          mkdir -p Payload
          # البحث عن ملف الـ .app الناتج (تجنب ملفات الـ Pods)
          # نبحث في مجلد البناء الافتراضي لـ Xcode
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d -not -path "*/Pods/*" | head -n 1)
          
          # إذا لم يجدها في DerivedData، يبحث في مجلد المشروع
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build/iOS -name "*.app" -type d -not -path "*/Pods/*" | head -n 1)
          fi
          
          echo "Found App at: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          
          # ضغط المجلد بصيغة IPA
          zip -r AliGame.ipa Payload
          
      # 5. رفع الملف النهائي لك
      - name: Upload Final IPA 🚀
        uses: actions/upload-artifact@v4
        with:
          name: Final-Game-IPA
          path: AliGame.ipa
          retention-days: 7
