name: Generate Final IPA 🚀

on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      # 1. فك تشفير الشهادة وتركيبها في السيرفر
      - name: Install SideStore Certificate 🔑
        uses: apple-actions/import-codesigning-certs@v3
        with:
          p12-file-base64: ${{ secrets.P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      # 2. بناء المشروع (عملية الـ Build)
      - name: Unity - Builder
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: iOS
          version: 6000.4.0f1

      # 3. تحويل مخرجات Xcode إلى ملف IPA (الخطوة السحرية)
      - name: Create IPA File 📦
        run: |
          mkdir -p build/iOS/Payload
          # نسخ التطبيق المستخرج إلى مجلد Payload ليصبح IPA
          find build/iOS -name "*.app" -exec cp -r {} build/iOS/Payload/ \;
          cd build/iOS && zip -r AliGhanam_Game.ipa Payload

      # 4. رفع الملفين (الـ Zip القديم والـ IPA الجديد)
      - name: Upload Results 🚀
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Build-Package
          path: |
            build/iOS/AliGhanam_Game.ipa
