name: Generate Final IPA 🚀

on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: macos-latest 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install SideStore Certificate 🔑
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          # فك التشفير مع تجاهل أي أسطر فارغة
          echo "${P12_BASE64}" | base64 --decode > certificate.p12
          
          security create-keychain -p "" build.keychain
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          
          # استيراد الشهادة مع معالجة كلمة السر
          security import certificate.p12 -k build.keychain -P "${P12_PASSWORD}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain


      # 2. بناء المشروع بواسطة Unity
      - name: Unity - Builder
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: iOS
          version: 6000.4.0f1

      # 3. تحويل مخرجات Xcode إلى ملف IPA
      - name: Create IPA File 📦
        run: |
          mkdir -p build/iOS/Payload
          # البحث عن ملف الـ .app الناتج
          find build/iOS -name "*.app" -exec cp -r {} build/iOS/Payload/ \;
          cd build/iOS && zip -r AliGhanam_Game.ipa Payload

      # 4. رفع الـ IPA النهائي
      - name: Upload Result 🚀
        uses: actions/upload-artifact@v4
        with:
          name: AliGhanam-IPA
          path: build/iOS/AliGhanam_Game.ipa
