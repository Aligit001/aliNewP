name: Get Unity License 💡

on: 
  workflow_dispatch: # يسمح لك بتشغيله يدوياً بضغطة زر

jobs:
  activation:
    name: Request Manual Activation File (.alf)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Request activation file
        uses: game-ci/unity-request-activation-file@v2
        id: get-alf
        with:
          unityVersion: 6000.4.0f1 # نسختك الحالية بدقة

      - name: Upload .alf file
        uses: actions/upload-artifact@v4
        with:
          name: Unity_v6000.4.0f1.alf
          path: ${{ steps.get-alf.outputs.filePath }}
