<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Install</title>
    <style>
        /* إضافة خط قمرة - ستحتاج إلى تضمين ملف الخط الفعلي إذا كان متوفراً لديك */
        @font-face {
            font-family: 'Qomra';
            src: local('Qomra'), local('قمرة');
            /* src: url('path/to/qomra-font.woff2') format('woff2'); */
        }

        :root {
            /* ألوان الهوية البصرية السورية 2025 */
            --sy-bg: #edebe0; /* Golden Wheat - فاتح للخلفية */
            --sy-text-main: #002623; /* Forest - داكن للنصوص الأساسية */
            --sy-text-sub: #428177; /* Forest - فاتح للنصوص الفرعية */
            --sy-button: #4a151e; /* Deep Umber - أحمر متوسط للأزرار */
            --sy-button-active: #260f14; /* Deep Umber - داكن عند الضغط */
            --sy-details: #988561; /* Golden Wheat - داكن للتفاصيل */
            --card-bg: #FFFFFF;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--sy-bg);
            /* استخدام خط قمرة كخيار أول */
            font-family: 'Qomra', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .app-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 40px;
            width: 280px;
            box-shadow: 0 20px 40px rgba(0, 38, 35, 0.08), 0 1px 3px rgba(0, 38, 35, 0.04); /* ظل مستوحى من لون Forest */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .app-icon {
            width: 118px;
            height: 118px;
            background-color: #b9a779; /* لون بديل قبل تحميل الصورة */
            border-radius: 27px;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            background-image: url('https://syrian.zone/syid/materials/%D8%A7%D9%84%D8%B9%D9%84%D9%85%20%D8%A7%D9%84%D8%B3%D9%88%D8%B1%D9%8A%20%D8%A8%D8%A7%D9%84%D9%86%D8%B3%D8%A8%20%D8%A7%D9%84%D8%B5%D8%AD%D9%8A%D8%AD%D8%A9.png');
            background-size: cover;
            background-position: center;
        }

        h1 {
            margin: 0 0 6px 0;
            font-size: 24px;
            font-weight: 700;
            color: var(--sy-text-main);
            letter-spacing: -0.015em;
        }

        p.developer {
            margin: 0 0 30px 0;
            font-size: 15px;
            font-weight: 400;
            color: var(--sy-text-sub);
            letter-spacing: -0.01em;
        }

        .get-button {
            background-color: var(--sy-button);
            color: #FFFFFF;
            text-decoration: none;
            font-size: 17px;
            font-weight: 600;
            padding: 12px 42px;
            border-radius: 24px;
            display: inline-block;
            transition: all 0.2s ease;
            letter-spacing: -0.02em;
        }

        .get-button:active {
            transform: scale(0.96);
            background-color: var(--sy-button-active);
        }

        .details {
            margin-top: 24px;
            font-size: 13px;
            color: var(--sy-details);
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="app-icon"></div>
        <h1>Game</h1>
        <p class="developer">تحميل APK</p>
        
        <a href="https://github.com/Aligit001/aliNewP/actions/runs/24972570601/artifacts/6652222496" class="get-button">Get</a>
        
        <div class="details"> علي developed by </div>
    </div>

</body>
</html>
