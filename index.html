<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Game</title>
    <style>
        /* ربط خط SF Arabic المرفوع على مستودع جيت هب */
        @font-face {
            font-family: 'SF-Arabic-Rounded';
            src: url('SFArabicRounded-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            /* ألوان الهوية البصرية السورية 2025 */
            --sy-bg: #edebe0; 
            --sy-text-main: #002623; 
            --sy-text-sub: #428177; 
            --sy-button-apk: #4a151e; /* العنابي للهوية السورية */
            --sy-button-ios: #1d1d1f; /* الأسود الرسمي لنسخة iOS */
            --sy-details: #988561; 
            --card-bg: #FFFFFF;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--sy-bg);
            /* الخط الأساسي هو الذي رفعته أنت */
            font-family: 'SF-Arabic-Rounded', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .app-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 40px;
            width: 280px;
            box-shadow: 0 20px 40px rgba(0, 38, 35, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .app-icon {
            width: 118px;
            height: 118px;
            background-color: #b9a779;
            border-radius: 27px;
            margin-bottom: 20px;
            background-image: url('https://syrian.zone/syid/materials/%D8%A7%D9%84%D8%B9%D9%84%D9%85%20%D8%A7%D9%84%D8%B3%D9%88%D8%B1%D9%8A%20%D8%A8%D8%A7%D9%84%D9%86%D8%B3%D8%A8%20%D8%A7%D9%84%D8%B5%D8%AD%D9%8A%D8%AD%D8%A9.png');
            background-size: cover;
            background-position: center;
        }

        h1 {
            margin: 0 0 6px 0;
            font-size: 24px;
            font-weight: 700;
            color: var(--sy-text-main);
        }

        p.developer {
            margin: 0 0 25px 0;
            font-size: 15px;
            font-weight: 500;
            color: var(--sy-text-sub);
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .get-button {
            color: #FFFFFF;
            text-decoration: none;
            font-size: 17px;
            font-weight: 600;
            padding: 13px 0;
            border-radius: 24px;
            display: block;
            transition: all 0.2s ease;
            width: 50%;
        }

        /* زر الأندرويد بالعنابي */
        .apk {
            background-color: var(--sy-button-apk);
        }

        /* زر الأيفون بالأسود */
        .ios {
            background-color: var(--sy-button-ios);
        }

        .get-button:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        .details {
            margin-top: 24px;
            font-size: 13px;
            color: var(--sy-details);
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="app-icon"></div>
        <h1>GAME</h1>
        <p class="developer">FUCKED LLC Company</p>
        
        <div class="button-container">
            <a href="ضع_رابط_الأندرويد_هنا" class="get-button apk">APK</a>
            <a href="ضع_رابط_الأيفون_هنا" class="get-button ios">iOS</a>
        </div>
        
        <div class="details"> علي Developed by </div>
    </div>

</body>
</html>
