<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل التطبيق - الهوية البصرية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* لوحة ألوان الوزارات الرسمية 2025 */
            --sy-forest-dark: #002623;   /* الأخضر العميق */
            --sy-forest-mid: #054239;    /* الأخضر المتوسط */
            --sy-wheat-gold: #b9a779;    /* الذهبي السوري */
            --sy-wheat-light: #edebe0;   /* لون الورق/الفانيليا */
            --sy-umber: #4a151e;         /* العنابي العميق */
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--sy-wheat-light); /* خلفية فاتحة مريحة */
            font-family: 'Cairo', 'Qomra', sans-serif; /* Cairo كبديل شغال و Qomra كأصل */
            -webkit-font-smoothing: antialiased;
        }

        .app-card {
            background: #FFFFFF;
            border-radius: 24px;
            padding: 40px;
            width: 300px;
            /* ظل ناعم باللون الأخضر الغامق */
            box-shadow: 0 15px 35px rgba(0, 38, 35, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border-top: 6px solid var(--sy-forest-dark); /* شريط علوي بلون الوزارة */
        }

        .app-icon {
            width: 110px;
            height: 110px;
            background-color: var(--sy-wheat-light);
            border-radius: 25px;
            margin-bottom: 25px;
            background-image: url('https://syrian.zone/syid/materials/%D8%A7%D9%84%D8%B9%D9%84%D9%85%20%D8%A7%D9%84%D8%B3%D9%88%D8%B1%D9%8A%20%D8%A8%D8%A7%D9%84%D9%86%D8%B3%D8%A8%20%D8%A7%D9%84%D8%B5%D8%AD%D9%8A%D8%AD%D8%A9.png');
            background-size: 90%; /* تصغير بسيط للعلم ليظهر كأيقونة */
            background-repeat: no-repeat;
            background-position: center;
            border: 1px solid rgba(0, 38, 35, 0.1);
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 22px;
            font-weight: 700;
            color: var(--sy-forest-dark);
        }

        p.developer {
            margin: 0 0 35px 0;
            font-size: 14px;
            font-weight: 400;
            color: var(--sy-forest-mid);
            opacity: 0.8;
        }

        .get-button {
            background-color: var(--sy-forest-dark); /* زر رسمي باللون الأخضر الوزاري */
            color: var(--sy-wheat-light);
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            padding: 14px 0;
            border-radius: 12px;
            display: inline-block;
            transition: all 0.3s ease;
            border: 1px solid var(--sy-forest-dark);
        }

        .get-button:hover {
            background-color: var(--sy-forest-mid);
            box-shadow: 0 4px 12px rgba(5, 66, 57, 0.2);
        }

        .get-button:active {
            transform: scale(0.98);
        }

        .details {
            margin-top: 25px;
            font-size: 12px;
            color: var(--sy-wheat-gold);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="app-icon"></div>
        <h1>تطبيق المشاريع</h1>
        <p class="developer">بوابة الخدمات الرقمية</p>
        
        <a href="https://productionresultssa18.blob.core.windows.net/actions-results/4ce683c5-4d2d-4ebd-986f-13312fc461d2/workflow-job-run-841c02c9-e3db-5931-b35c-82085be1459a/artifacts/7c0a1cc07aa8957b3c563e30aec016a323af891f0aa930e0944c76074da3d7ad.zip?..." class="get-button">تحميل APK</a>
        
        <div class="details">تطوير: علي | 2025</div>
    </div>

</body>
</html>
